<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Artifact #01</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff; font-family: sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        /* Video Background */
        .video-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }
        video {
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.2) blur(15px); transition: 3s;
        }
        .clear-video { filter: brightness(0.6) blur(0px) !important; }

        /* General Box Styling */
        .content-box {
            position: absolute; text-align: center; width: 90%;
            transition: opacity 0.8s ease; z-index: 10;
        }

        .message { line-height: 2; font-size: 1rem; margin-bottom: 30px; letter-spacing: 1px; }

        /* Buttons */
        .btn {
            background: none; border: 1px solid #00ffff; color: #00ffff;
            padding: 15px 40px; font-size: 0.8rem; letter-spacing: 3px;
            cursor: pointer; text-transform: uppercase;
        }
        .glitch-btn { border-color: #ff3333; color: #ff3333; margin-top: 20px; }

        /* Initial State */
        #ui-glitch { display: none; opacity: 0; }

        /* Shake Effect */
        .shake { animation: shake-anim 0.3s ease-in-out; filter: invert(1); }
        @keyframes shake-anim {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-5px, 5px); }
            50% { transform: translate(5px, -5px); }
        }

        /* Dialogue Box */
        #xiao-ming-box {
            position: fixed; bottom: 30px; width: 85%; max-width: 400px;
            background: rgba(0,0,0,0.8); border: 1px solid #00ffff;
            padding: 20px; border-radius: 10px; opacity: 0; transition: 1s;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="bgVideo" loop playsinline muted autoplay>
            <source src="animated_work.mp4" type="video/mp4">
        </video>
    </div>

    <div class="content-box" id="ui-normal">
        <div class="message">
            "I built something secret for you...<br>I wanted you to have it."
        </div>
        <button class="btn" onclick="triggerGlitch()">[ ACCEPT ]</button>
    </div>

    <div class="content-box" id="ui-glitch">
        <div style="color: #ff3333; margin-bottom: 20px; font-family: monospace;">
            SYSTEM_FAILURE // FRAGMENT_DETECTED
        </div>
        <button class="btn glitch-btn" onclick="revealVideo()">[ RESTORE_DATA ]</button>
    </div>

    <div id="xiao-ming-box">
        <div style="color: #00ffff; font-size: 0.7rem; margin-bottom: 5px;">XIAO MING</div>
        <div id="dialogue-text" style="font-size: 0.9rem; font-weight: 200;"></div>
    </div>

    <script>
        function triggerGlitch() {
            const normal = document.getElementById('ui-normal');
            const glitch = document.getElementById('ui-glitch');
            
            normal.style.opacity = '0';
            setTimeout(() => {
                normal.style.display = 'none';
                document.body.classList.add('shake');
                
                setTimeout(() => {
                    document.body.classList.remove('shake');
                    glitch.style.display = 'block';
                    setTimeout(() => { glitch.style.opacity = '1'; }, 50);
                }, 300);
            }, 800);
        }

        function revealVideo() {
            const glitch = document.getElementById('ui-glitch');
            const video = document.getElementById('bgVideo');
            const box = document.getElementById('xiao-ming-box');
            
            glitch.style.opacity = '0';
            setTimeout(() => { glitch.style.display = 'none'; }, 800);

            video.classList.add('clear-video');
            video.muted = false; // Unmute so she can hear the comedy vibe
            video.play();

            setTimeout(() => {
                box.style.opacity = '1';
                typeWriter("Wait... you actually scanned it? I didn't think the system would hold up. You're actually seeing this... wow.");
            }, 3000);
        }

        function typeWriter(text) {
            let i = 0;
            const element = document.getElementById('dialogue-text');
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 40);
                }
            }
            type();
        }
    </script>
</body>
</html>
