<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Artifact #01 | Terminal</title>
    <style>
        /* THE BREATHE EFFECT */
.nexus-core {
    /* ... keep your existing styles ... */
    animation: rotate-nexus 25s linear infinite, 
               pulse-glow 4s ease-in-out infinite;
}

@keyframes pulse-glow {
    0%, 100% { filter: drop-shadow(0 0 20px #00ffff) brightness(1.1); }
    50% { filter: drop-shadow(0 0 50px #00ffff) brightness(1.5); }
}
        /* --- THE ARCHITECT'S DESIGN (CSS) --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Courier New', monospace; color: #00ffff;
        }

        #terminal-wrapper {
            position: relative; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        /* LAYER 1: STATIC BACKGROUND STARS */
        .background-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('chronos_nexus.png');
            background-size: cover; background-position: center;
            filter: brightness(0.3) blur(2px);
            z-index: 1;
        }

        /* LAYER 2: THE SPINNING MAGIC CIRCLE (Clipped) */
        .nexus-core {
            position: relative; z-index: 10;
            width: 80vw; height: 80vw; max-width: 400px; max-height: 400px;
            background-image: url('chronos_nexus.png');
            background-size: cover; background-position: center;
            
            /* This cuts the rectangle into a perfect circle */
            clip-path: circle(38% at 50% 50%); 
            
            filter: drop-shadow(0 0 30px #00ffff) brightness(1.3);
            animation: rotate-nexus 25s linear infinite;
            cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nexus-core:active { transform: scale(0.9); }

        @keyframes rotate-nexus {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* SCANNING LINE EFFECT */
        .scanner {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 255, 0.2), transparent);
            z-index: 15; pointer-events: none;
            animation: scan-loop 4s ease-in-out infinite;
        }

        @keyframes scan-loop {
            0%, 100% { transform: translateY(-100%); }
            50% { transform: translateY(100%); }
        }

        /* TEXT OVERLAYS */
        .ui-header { position: absolute; top: 5%; z-index: 20; letter-spacing: 4px; font-size: 0.7rem; opacity: 0.7; }
        .ui-footer { position: absolute; bottom: 8%; z-index: 20; text-align: center; }
        
        .status-text { font-size: 1rem; text-shadow: 0 0 10px #00ffff; margin-bottom: 10px; }

        /* THE VIDEO VAULT (Hidden until Click) */
        #video-vault {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100;
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
        }

        video {
            width: 90%; max-width: 600px;
            border: 1px solid #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .glitch-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 200; display: none;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="terminal-wrapper">
        <div class="background-layer"></div>
        <div class="ui-header">PROTOCOL_01 // SECURE_ACCESS</div>
        
        <div class="nexus-core" onclick="initiateSync()"></div>
        <div class="scanner"></div>

        <div class="ui-footer">
            <div class="status-text" id="status-msg">WAITING_FOR_TOUCH_INPUT...</div>
            <div style="font-size: 0.6rem; opacity: 0.5;">ARCHITECT_ID: AUNG_AUNG_OO</div>
        </div>
    </div>

    <div id="video-vault">
        <video id="main-artifact-video">
            <source src="artifact_01.mp4" type="video/mp4">
        </video>
        <p style="margin-top: 20px; font-size: 0.8rem; letter-spacing: 2px;">DECRYPTION_COMPLETE // ARTIFACT_01</p>
        <button onclick="location.reload()" style="background:transparent; border:1px solid #00ffff; color:#00ffff; padding:5px 15px; cursor:pointer; font-family:monospace; margin-top:10px;">RE-LOCK</button>
    </div>

    <div class="glitch-overlay" id="flash"></div>

    <script>
        /* --- THE LOGIC (JAVASCRIPT) --- */
        function initiateSync() {
            const status = document.getElementById('status-msg');
            const flash = document.getElementById('flash');
            const vault = document.getElementById('video-vault');
            const video = document.getElementById('main-artifact-video');

            status.innerText = "SYNCHRONIZING_WITH_NEXUS...";
            status.style.color = "#fff";

            // Haptic Feedback (Phone Vibrates)
            if (navigator.vibrate) { navigator.vibrate([100, 50, 100]); }

            // Flash effect after 1.5 seconds
            setTimeout(() => {
                flash.style.display = 'block';
                
                setTimeout(() => {
                    flash.style.display = 'none';
                    document.getElementById('terminal-wrapper').style.display = 'none';
                    vault.style.display = 'flex';
                    video.play();
                }, 100);

            }, 1500);
        }
    </script>
</body>
</html>
