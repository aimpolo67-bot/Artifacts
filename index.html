<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artifact #01 | Chronos Nexus</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui-overlay">
        <div class="scanner-line"></div>
        <p>SCANNING FOR CHRONOS NEXUS...</p>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="nexus-video" src="artifact_01.mp4" loop="false" crossorigin="anonymous"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#nexus-video" width="1" height="0.6" position="0 0 0.1"></a-video>
            
            <a-ring color="#00ffff" radius-inner="0.7" radius-outer="0.8" 
                    animation="property: rotation; to: 0 0 360; loop: true; dur: 4000"></a-ring>
        </a-entity>
    </a-scene>

    <script src="script.js"></script>
</body>
</html>
