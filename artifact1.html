<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Artifact #01 | Perception Sync</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;500&display=swap');

        body { 
            background-color: #000; color: #fff; font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden; perspective: 1000px;
        }

        /* 1. BACKGROUND LAYERS */
        .stars-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -5; transition: opacity 2s ease;
        }

        .star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.5; animation: twinkle var(--duration) infinite;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        /* THE CLASSROOM (With the fixes: contain & .png) */
        #classroom-preview {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('classroom.png') no-repeat center center; 
            background-size: contain; background-color: #000;
            filter: brightness(0.5);
            display: none; opacity: 0; transition: opacity 3s ease; z-index: -4; 
        }

        /* 2. THE REALITY CRACK ANIMATION (NEW) */
        #anomaly-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: none; align-items: center; justify-content: center; flex-direction: column;
            background: radial-gradient(circle at center, rgba(0,255,255,0.1) 0%, transparent 60%);
            opacity: 0; transition: opacity 2s ease; z-index: 50;
        }

        .fracture-line {
            width: 2px; height: 150px; background: #fff;
            box-shadow: 0 0 15px #00ffff, 0 0 30px #fff;
            animation: pulse-crack 0.1s infinite alternate;
            margin-bottom: 30px; border-radius: 50%;
        }
        @keyframes pulse-crack {
            0% { transform: scaleY(1) skewX(2deg); opacity: 0.8; }
            100% { transform: scaleY(1.1) skewX(-2deg); opacity: 1; }
        }

        /* 3. SCREEN EFFECTS & VIDEO */
        #reality-crack {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 255, 255, 0.1); backdrop-filter: blur(25px);
            display: none; opacity: 0; z-index: 80; transition: 0.8s ease;
        }

        .video-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -1; opacity: 0; transition: opacity 2s ease;
        }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }

        .white-flash {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #fff; opacity: 0; pointer-events: none; z-index: 100;
            transition: opacity 0.6s ease-in-out;
        }

        /* 4. UI STYLES */
        .content-box { position: absolute; text-align: center; transition: opacity 1s ease; z-index: 10; width: 100%; }
        .title { color: #00ffff; letter-spacing: 12px; font-size: 0.7rem; font-weight: 200; margin-bottom: 25px; text-transform: uppercase; opacity: 0.6;}
        .message { line-height: 2.5; font-size: 1.1rem; font-weight: 200; letter-spacing: 1.5px; margin-bottom: 40px; color: rgba(255, 255, 255, 0.9); }
        .chinese { font-size: 1.5rem; color: #fff; margin-top: 40px; font-weight: 100; letter-spacing: 10px; opacity: 0.5; }

        .btn {
            background: none; border: 1px solid rgba(0, 255, 255, 0.4);
            color: #00ffff; padding: 15px 40px; font-size: 0.8rem;
            letter-spacing: 5px; cursor: pointer; transition: 0.5s;
            font-family: 'Inter', sans-serif; font-weight: 200;
        }
        .glitch-btn { border-color: #ff3333; color: #ff3333; font-family: monospace; margin-top: 20px; }
        .final-btn { border-color: #fff; color: #fff; box-shadow: 0 0 20px rgba(0, 255, 255, 0.4); background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); }

        .system-shake { animation: hard-shake 0.3s ease-in-out; filter: invert(1); }
        @keyframes hard-shake { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(-5px, 5px); } 50% { transform: translate(5px, -5px); } }

    </style>
</head>
<body>

    <div class="white-flash" id="flash"></div>
    <div id="reality-crack"></div>
    <div class="stars-container" id="stars"></div>
    
    <div id="classroom-preview"></div>

    <div id="anomaly-layer">
        <div class="fracture-line"></div>
        <button class="btn final-btn" onclick="crackReality()">[ CHECK_ANOMALY ]</button>
    </div>

    <div class="video-container" id="vid-wrap">
        <video id="bgVideo" loop playsinline muted>
            <source src="animated_work.mp4" type="video/mp4">
        </video>
    </div>

    <div class="content-box" id="ui-normal">
        <div class="title">Artifact #01</div>
        <div class="message">
            "I built something I have never done before,<br>
            a secret piece that only you can unlock,<br>
            and I wanted you to have it."
        </div>
        <button class="btn" onclick="triggerPhase2()">[ ACCEPT ]</button>
        <div class="chinese">第一个碎片</div>
    </div>

    <div class="content-box" id="ui-glitch" style="display:none; opacity:0;">
        <div id="status-text" style="color:#ff3333; font-family:monospace; margin-bottom:20px; letter-spacing:2px;">
            SYSTEM_FAILURE // ARTIFACT_OVERLOAD
        </div>
        <button class="btn glitch-btn" id="restore-btn" onclick="startLoading()">[ RESTORE_DATA_POINT ]</button>
    </div>

    <div class="content-box" id="ui-techno" style="display:none; opacity:0;">
        <div class="message" style="color:#00ffff; font-family: monospace; font-size: 0.8rem; line-height: 2;">
            SYSTEM SYNC SUCCESSFUL.<br>
            ESTABLISHING CONNECTION...
        </div>
    </div>

    <script>
        const starContainer = document.getElementById('stars');
        for (let i = 0; i < 60; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${Math.random() * 100}vw`;
            star.style.top = `${Math.random() * 100}vh`;
            const size = Math.random() * 2 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
            starContainer.appendChild(star);
        }

        function triggerPhase2() {
            const normal = document.getElementById('ui-normal');
            const glitch = document.getElementById('ui-glitch');
            normal.style.opacity = '0';
            setTimeout(() => {
                normal.style.display = 'none';
                document.body.classList.add('system-shake');
                setTimeout(() => {
                    document.body.classList.remove('system-shake');
                    glitch.style.display = 'block';
                    setTimeout(() => { glitch.style.opacity = '1'; }, 50);
                }, 400);
            }, 800);
        }

        function startLoading() {
            const btn = document.getElementById('restore-btn');
            const status = document.getElementById('status-text');
            btn.style.display = 'none';
            let progress = 0;
            const interval = setInterval(() => {
                progress += 5;
                status.innerHTML = `FIXING SYSTEM ERROR... ${progress}%`;
                if (progress >= 100) {
                    clearInterval(interval);
                    showSyncText();
                }
            }, 150); 
        }

        function showSyncText() {
            const glitch = document.getElementById('ui-glitch');
            const techno = document.getElementById('ui-techno');

            glitch.style.opacity = '0';
            setTimeout(() => {
                glitch.style.display = 'none';
                techno.style.display = 'block';
                setTimeout(() => { techno.style.opacity = '1'; }, 50);

                setTimeout(() => {
                    techno.style.opacity = '0';
                    setTimeout(() => {
                        techno.style.display = 'none';
                        showClassroomAndAnomaly(); // TRIGGER NEW PHASE
                    }, 1000);
                }, 3000);
            }, 800);
        }

        // STEP-BY-STEP: Show Classroom -> Wait -> Show Crack
        function showClassroomAndAnomaly() {
            const preview = document.getElementById('classroom-preview');
            const stars = document.getElementById('stars');
            const anomalyLayer = document.getElementById('anomaly-layer');
            
            stars.style.opacity = '0'; // Fade out stars
            preview.style.display = 'block';
            
            setTimeout(() => {
                preview.style.opacity = '1'; // Fade in empty classroom
                
                // Wait 4 seconds in the quiet classroom, then the system cracks
                setTimeout(() => {
                    anomalyLayer.style.display = 'flex';
                    setTimeout(() => {
                        anomalyLayer.style.opacity = '1';
                    }, 50);
                }, 4000);
            }, 500);
        }

        // FINAL REVEAL: Triggered by the [ CHECK_ANOMALY ] button
        function crackReality() {
            const crack = document.getElementById('reality-crack');
            const flash = document.getElementById('flash');
            const video = document.getElementById('bgVideo');
            const videoWrap = document.getElementById('vid-wrap');
            const preview = document.getElementById('classroom-preview');
            const anomalyLayer = document.getElementById('anomaly-layer');

            // Instantly hide the crack and button
            anomalyLayer.style.display = 'none'; 
            
            crack.style.display = 'block';
            setTimeout(() => { crack.style.opacity = '1'; }, 50);
            document.body.classList.add('system-shake');

            setTimeout(() => {
                flash.style.opacity = '1'; // The big white flash
                setTimeout(() => {
                    // Clean up old layers
                    preview.style.display = 'none';
                    crack.style.display = 'none';
                    document.body.classList.remove('system-shake');
                    
                    // Reveal Video
                    videoWrap.style.opacity = '1';
                    video.play();
                    
                    // Fade out flash
                    flash.style.opacity = '0';
                }, 600);
            }, 1000);
        }
    </script>
</body>
</html>
