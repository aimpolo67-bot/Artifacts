<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artifact #01 | The First Fragment</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;500&display=swap');

        body { 
            background-color: #000; color: #fff; font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden; perspective: 1000px;
        }

        /* 1. BACKGROUND LAYERS */
        .stars-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -3;
        }

        /* The Techno Room (Grid Effect) */
        #techno-room {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center;
            display: none; opacity: 0; transition: 2s ease; z-index: -2;
        }

        .video-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -1; opacity: 0; transition: opacity 4s ease;
        }
        video { width: 100vw; height: 100vh; object-fit: cover; filter: brightness(0.4); }

        /* 2. UI COMPONENTS */
        .content-box { position: absolute; text-align: center; transition: opacity 1s ease; z-index: 10; width: 100%; }
        .message { line-height: 2.5; font-size: 1.1rem; font-weight: 200; letter-spacing: 1.5px; margin-bottom: 40px; color: rgba(255, 255, 255, 0.9); }
        
        .btn {
            background: none; border: 1px solid rgba(0, 255, 255, 0.4);
            color: #00ffff; padding: 15px 40px; font-size: 0.8rem;
            letter-spacing: 5px; cursor: pointer; transition: 0.5s; font-family: 'Inter', sans-serif;
        }
        .glitch-btn { border-color: #ff3333; color: #ff3333; font-family: monospace; }

        /* 3. TRANSITIONS & SHAKE */
        #ui-glitch, #ui-techno { display: none; opacity: 0; }
        .system-shake { animation: hard-shake 0.3s ease-in-out; filter: invert(1); }
        @keyframes hard-shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-5px, 5px); }
            50% { transform: translate(5px, -5px); }
        }

        /* 4. XIAO MING BOX */
        #xiao-ming-box {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(50px);
            background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); padding: 20px 30px; border-radius: 15px;
            width: 80%; max-width: 400px; opacity: 0; transition: 1s; z-index: 50;
        }
        #xiao-ming-box.show-dialogue { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>
    <div id="techno-room"></div>

    <div class="video-container" id="vid-wrap">
        <video id="bgVideo" loop playsinline muted>
            <source src="animated_work.mp4" type="video/mp4">
        </video>
    </div>

    <div class="content-box" id="ui-normal">
        <div class="message">"I built something secret for you...<br>I wanted you to have it."</div>
        <button class="btn" onclick="triggerPhase2()">[ ACCEPT ]</button>
    </div>

    <div class="content-box" id="ui-glitch">
        <div id="status-text" style="color:#ff3333; font-family:monospace; margin-bottom:20px;">SYSTEM_FAILURE // FRAGMENT_DETECTED</div>
        <button class="btn glitch-btn" id="restore-btn" onclick="startLoading()">[ RESTORE_DATA ]</button>
    </div>

    <div class="content-box" id="ui-techno">
        <div class="message" style="color:#00ffff;">DATA RESTORED.<br>THE ARCHITECT'S CHAMBER IS OPEN.</div>
        <button class="btn" style="border-color:#00ffff;" onclick="revealFinal()">[ VIEW_FRAGMENT ]</button>
    </div>

    <div id="xiao-ming-box">
        <div style="color:#00ffff; font-size:0.7rem; margin-bottom:8px; text-transform:uppercase;">Xiao Ming</div>
        <div style="color:#fff; font-size:0.95rem; font-weight:200;">Wait... you actually scanned it and opened it? Wow. I really didn't think you would get this far...</div>
    </div>

    <script>
        function triggerPhase2() {
            const uiNormal = document.getElementById('ui-normal');
            const uiGlitch = document.getElementById('ui-glitch');
            uiNormal.style.opacity = '0';
            setTimeout(() => {
                uiNormal.style.display = 'none';
                document.body.classList.add('system-shake');
                setTimeout(() => {
                    document.body.classList.remove('system-shake');
                    uiGlitch.style.display = 'block';
                    setTimeout(() => { uiGlitch.style.opacity = '1'; }, 50);
                }, 400);
            }, 800);
        }

        function startLoading() {
            const btn = document.getElementById('restore-btn');
            const status = document.getElementById('status-text');
            btn.style.display = 'none';
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += 5;
                status.innerHTML = `DECRYPTING... ${progress}%`;
                if (progress >= 100) {
                    clearInterval(interval);
                    enterTechnoPlace();
                }
            }, 250); 
        }

        function enterTechnoPlace() {
            const uiGlitch = document.getElementById('ui-glitch');
            const uiTechno = document.getElementById('ui-techno');
            const technoRoom = document.getElementById('techno-room');

            uiGlitch.style.opacity = '0';
            setTimeout(() => {
                uiGlitch.style.display = 'none';
                technoRoom.style.display = 'block';
                setTimeout(() => { 
                    technoRoom.style.opacity = '1';
                    uiTechno.style.display = 'block';
                    setTimeout(() => { uiTechno.style.opacity = '1'; }, 50);
                }, 100);
            }, 1000);
        }

        function revealFinal() {
            const uiTechno = document.getElementById('ui-techno');
            const videoWrap = document.getElementById('vid-wrap');
            const video = document.getElementById('bgVideo');
            const xiaoMingBox = document.getElementById('xiao-ming-box');

            uiTechno.style.opacity = '0';
            setTimeout(() => { uiTechno.style.display = 'none'; }, 1000);

            videoWrap.style.opacity = '1';
            video.play();

            setTimeout(() => {
                xiaoMingBox.classList.add('show-dialogue');
            }, 5000);
        }
    </script>
</body>
</html>
