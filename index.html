<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            background-color: #000; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; margin: 0;
        }
        
        /* The Containment Field - Fixed size to prevent drift */
        .artifact-zone { 
            position: relative; 
            width: 600px; height: 600px; 
        }

        /* FIXED: Base class now uses 100% scale to prevent ghosting/shadowing */
        .layer {
            position: absolute; 
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: 100% 100%; /* Force exact fit to container */
            background-position: center; 
            background-repeat: no-repeat;
            filter: drop-shadow(0 0 10px #00ffff); 
        }

        /* 5. Outest - Slowest (Background) */
        .layer-5 {
            background-image: url('5.png');
            animation: spin-right 45s linear infinite;
            opacity: 1;
            z-index: 1;
        }

        /* 4. Outer */
        .layer-4 {
            background-image: url('4.png');
            animation: spin-left 30s linear infinite;
            z-index: 2;
        }

        /* 3. Middle */
        .layer-3 {
            background-image: url('3.png');
            animation: spin-right 20s linear infinite;
            z-index: 3;
        }

        /* 2. Inner */
        .layer-2 {
            background-image: url('2.png');
            animation: spin-left 12s linear infinite;
            z-index: 4;
        }

        /* 1. Core - Fastest (Top Layer) */
        .layer-1 {
            background-image: url('1.png');
            animation: spin-right 10s linear infinite;
            z-index: 5;
        }

        /* Animation Math */
        @keyframes spin-right { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-left { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
        
        @keyframes core-pulse { 
            50% { filter: drop-shadow(0 0 30px #fff) brightness(1.5); transform: scale(1.05); } 
        }
    </style>
</head>
<body>

    <div class="artifact-zone">
        <div class="layer layer-5"></div>
        <div class="layer layer-4"></div>
        <div class="layer layer-3"></div>
        <div class="layer layer-2"></div>
        <div class="layer layer-1"></div>
    </div>

</body>
</html>
