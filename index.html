<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Artifact #01 | Terminal</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #terminal-wrapper {
            position: relative; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
        }

        /* LAYER 1: THE STARS (Fixed & Sharp) */
        .background-stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('chronos_nexus.png');
            background-size: cover; background-position: center;
            opacity: 0.4; filter: blur(1px); z-index: 1;
        }

        /* LAYER 2: THE MAGIC CIRCLE (Large & High Quality) */
        .nexus-core {
            position: relative; z-index: 10;
            width: 90vw; height: 90vw; max-width: 500px; max-height: 500px;
            background-image: url('chronos_nexus.png');
            background-size: 110%; /* Makes the circle fill the area better */
            background-position: center;
            border-radius: 50%; /* Cleaner than clip-path */
            
            box-shadow: 0 0 50px #00ffff, inset 0 0 30px #00ffff;
            border: 2px solid rgba(0, 255, 255, 0.3);
            
            animation: rotate-nexus 30s linear infinite, pulse-glow 4s ease-in-out infinite;
            cursor: pointer;
        }

        @keyframes rotate-nexus {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse-glow {
            0%, 100% { filter: brightness(1) drop-shadow(0 0 20px #00ffff); }
            50% { filter: brightness(1.4) drop-shadow(0 0 40px #00ffff); }
        }

        /* HUD ELEMENTS */
        .ui-text {
            position: absolute; z-index: 20; color: #00ffff;
            text-transform: uppercase; letter-spacing: 4px; text-align: center;
        }
        .header { top: 5%; font-size: 0.7rem; opacity: 0.8; }
        .footer { bottom: 8%; }
        
        .sync-btn {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff; color: #00ffff;
            padding: 12px 30px; font-family: inherit;
            cursor: pointer; margin-top: 15px;
            box-shadow: 0 0 10px #00ffff;
        }

        #video-vault {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }

        video { width: 95%; max-width: 700px; border: 2px solid #00ffff; }
    </style>
</head>
<body>

    <div id="terminal-wrapper">
        <div class="background-stars"></div>
        <div class="ui-text header">PROTOCOL_01 // SECURE_SYNC</div>
        
        <div class="nexus-core" onclick="initiateSync()"></div>

        <div class="ui-text footer">
            <div id="status">STATUS: WAITING_FOR_SYNC</div>
            <button class="sync-btn" onclick="initiateSync()">INITIALIZE ARCHITECT KEY</button>
        </div>
    </div>

    <div id="video-vault">
        <video id="main-video" controls><source src="artifact_01.mp4" type="video/mp4"></video>
        <button onclick="location.reload()" style="margin-top:20px; color:#00ffff; background:none; border:none; cursor:pointer;">[ RE-LOCK TERMINAL ]</button>
    </div>

    <script>
        function initiateSync() {
            document.getElementById('status').innerText = "SYNCING...";
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            
            setTimeout(() => {
                document.getElementById('terminal-wrapper').style.display = 'none';
                const vault = document.getElementById('video-vault');
                vault.style.display = 'flex';
                document.getElementById('main-video').play();
            }, 1000);
        }
    </script>
</body>
</html>
