<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Artifact #01 | Reality Sync</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;500&display=swap');

        body { 
            background-color: #000; color: #fff; font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }

        /* 1. BACKGROUND LAYERS */
        .stars-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -5; transition: opacity 2s ease;
        }

        .star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.5; animation: twinkle var(--duration) infinite;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        #classroom-preview {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('classroom.png') no-repeat center center; 
            background-size: contain; background-color: #000;
            filter: brightness(0.4); display: none; opacity: 0; transition: opacity 3s ease; z-index: -4; 
        }

        /* 2. THE TEXTURED RIFT (USING YOUR IMAGE) */
        #rift-zone {
            position: fixed; 
            top: 52%; right: 15%; /* Positioned on the wall */
            width: 250px; height: 250px; 
            display: none; opacity: 0;
            transition: opacity 2.5s ease; z-index: 50;
        }

        .rift-hd-texture {
            width: 100%; height: 100%;
            background: url('rift_white.png') no-repeat center center;
            background-size: contain;
            mix-blend-mode: screen; /* This makes your black background transparent */
            filter: drop-shadow(0 0 12px #fff) brightness(1.6);
            animation: rift-vibrate 0.1s infinite alternate, white-energy-pulse 3s infinite alternate;
            display: flex; align-items: center; justify-content: center;
        }

        @keyframes rift-vibrate {
            0% { transform: translate(1px, 1px) rotate(0.1deg); }
            100% { transform: translate(-1px, -1px) rotate(-0.1deg); }
        }

        @keyframes white-energy-pulse {
            0% { filter: drop-shadow(0 0 10px #fff) brightness(1.2); }
            100% { filter: drop-shadow(0 0 30px #fff) brightness(2.2); }
        }

        .btn-check {
            background: none; border: none; color: transparent;
            width: 100%; height: 100%; cursor: pointer;
        }

        /* 3. TRANSITION EFFECTS */
        .white-flash {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #fff; opacity: 0; pointer-events: none; z-index: 100; transition: 0.6s;
        }

        .video-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -1; opacity: 0; transition: 2s;
        }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); }

        /* 4. UI COMPONENTS */
        .content-box { position: absolute; text-align: center; transition: 1s; z-index: 10; width: 100%; }
        .title { color: #00ffff; letter-spacing: 12px; font-size: 0.7rem; text-transform: uppercase; opacity: 0.6; margin-bottom: 25px;}
        .message { line-height: 2.5; font-size: 1.1rem; font-weight: 200; letter-spacing: 1.5px; margin-bottom: 40px; color: rgba(255,255,255,0.95); }
        .chinese { font-size: 1.5rem; color: #fff; margin-top: 40px; font-weight: 100; letter-spacing: 10px; opacity: 0.5; }

        .btn {
            background: none; border: 1px solid rgba(0, 255, 255, 0.4);
            color: #00ffff; padding: 15px 45px; font-size: 0.8rem; letter-spacing: 5px; cursor: pointer; transition: 0.5s;
        }
        .glitch-btn { border-color: #ff3333; color: #ff3333; font-family: monospace; }
        
        .system-shake { animation: shake 0.25s infinite; filter: invert(1); }
        @keyframes shake { 0% { transform: translate(4px, 4px); } 50% { transform: translate(-4px, -4px); } 100% { transform: translate(4px, -4px); } }
    </style>
</head>
<body>

    <div class="white-flash" id="flash"></div>
    <div class="stars-container" id="stars"></div>
    <div id="classroom-preview"></div>

    <div id="rift-zone">
        <div class="rift-hd-texture">
            <button class="btn-check" onclick="finalReveal()"></button>
        </div>
    </div>

    <div class="video-container" id="vid-wrap">
        <video id="bgVideo" loop playsinline muted>
            <source src="animated_work.mp4" type="video/mp4">
        </video>
    </div>

    <div class="content-box" id="ui-1">
        <div class="title">Artifact #01</div>
        <div class="message">
            "I built something I have never done before,<br>
            a secret piece that only you can unlock,<br>
            and I wanted you to have it."
        </div>
        <button class="btn" onclick="startGlitch()">[ ACCEPT ]</button>
        <div class="chinese">第一个碎片</div>
    </div>

    <div class="content-box" id="ui-2" style="display:none; opacity:0;">
        <div id="status" style="color:#ff3333; font-family:monospace; margin-bottom:20px; letter-spacing:2px;">SYSTEM_FAILURE // ARTIFACT_OVERLOAD</div>
        <button class="btn glitch-btn" id="load-btn" onclick="loadingSequence()">[ RESTORE_DATA_POINT ]</button>
    </div>

    <div class="content-box" id="ui-3" style="display:none; opacity:0;">
        <div class="message" style="color:#00ffff; font-family: monospace; font-size: 0.8rem;">
            SYSTEM SYNC SUCCESSFUL.<br>
            ESTABLISHING CONNECTION...
        </div>
    </div>

    <script>
        const sc = document.getElementById('stars');
        for (let i = 0; i < 60; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = Math.random() * 100 + 'vh';
            const sz = Math.random() * 2 + 'px';
            s.style.width = sz; s.style.height = sz;
            s.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            sc.appendChild(s);
        }

        function startGlitch() {
            document.getElementById('ui-1').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('ui-1').style.display = 'none';
                document.body.classList.add('system-shake');
                setTimeout(() => {
                    document.body.classList.remove('system-shake');
                    document.getElementById('ui-2').style.display = 'block';
                    setTimeout(() => document.getElementById('ui-2').style.opacity = '1', 50);
                }, 400);
            }, 800);
        }

        function loadingSequence() {
            document.getElementById('load-btn').style.display = 'none';
            let p = 0;
            let itv = setInterval(() => {
                p += 5;
                document.getElementById('status').innerText = `FIXING SYSTEM ERROR... ${p}%`;
                if (p >= 100) {
                    clearInterval(itv);
                    showSyncText();
                }
            }, 120);
        }

        function showSyncText() {
            document.getElementById('ui-2').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('ui-2').style.display = 'none';
                document.getElementById('ui-3').style.display = 'block';
                setTimeout(() => document.getElementById('ui-3').style.opacity = '1', 50);
                setTimeout(() => {
                    document.getElementById('ui-3').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('ui-3').style.display = 'none';
                        showClassroom();
                    }, 1000);
                }, 3000);
            }, 800);
        }

        function showClassroom() {
            const preview = document.getElementById('classroom-preview');
            const stars = document.getElementById('stars');
            const rift = document.getElementById('rift-zone');
            
            stars.style.opacity = '0';
            preview.style.display = 'block';
            setTimeout(() => {
                preview.style.opacity = '1';
                // Wait 4 seconds in the quiet empty classroom before crack appears
                setTimeout(() => {
                    rift.style.display = 'block';
                    setTimeout(() => rift.style.opacity = '1', 50);
                }, 4000);
            }, 500);
        }

        function finalReveal() {
            const flash = document.getElementById('flash');
            document.body.classList.add('system-shake');
            setTimeout(() => {
                flash.style.opacity = '1';
                setTimeout(() => {
                    document.getElementById('classroom-preview').style.display = 'none';
                    document.getElementById('rift-zone').style.display = 'none';
                    document.body.classList.remove('system-shake');
                    document.getElementById('vid-wrap').style.opacity = '1';
                    document.getElementById('bgVideo').play();
                    flash.style.opacity = '0';
                }, 600);
            }, 800);
        }
    </script>
</body>
</html>
