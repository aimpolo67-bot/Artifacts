<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artifact #01 | The First Fragment</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300&display=swap');

        body { 
            background-color: #000; color: #fff; font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
            perspective: 1000px;
        }

        /* 1. THE VIDEO BACKGROUND (Starts Blurred) */
        .video-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
        }
        video {
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.2) blur(15px);
            transition: filter 3s ease;
        }
        .clear-video { filter: brightness(0.6) blur(0px) !important; }

        /* 2. THE NORMAL UI (PHASE 1) */
        .content-box {
            text-align: center; transition: opacity 1.5s ease, transform 1.5s ease;
            z-index: 10;
        }
        
        .title { color: #00ffff; letter-spacing: 12px; font-size: 0.7rem; font-weight: 200; margin-bottom: 25px; text-transform: uppercase; opacity: 0.6;}
        .message { line-height: 2.5; font-size: 1.1rem; font-weight: 200; letter-spacing: 1.5px; margin-bottom: 40px; color: rgba(255, 255, 255, 0.9); }
        .chinese { font-size: 1.5rem; color: #fff; margin-top: 40px; font-weight: 100; letter-spacing: 10px; opacity: 0.5; }

        /* 3. NORMAL BUTTON */
        .unlock-btn {
            background: none; border: 1px solid rgba(0, 255, 255, 0.4);
            color: #00ffff; padding: 15px 40px; font-size: 0.8rem;
            letter-spacing: 5px; cursor: pointer; transition: 0.5s;
            font-family: 'Inter', sans-serif; font-weight: 200;
        }
        .unlock-btn:hover { background: rgba(0, 255, 255, 0.1); border-color: #00ffff; box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); }

        /* 4. GLITCH EFFECTS & UI (PHASE 2) */
        .system-shake { animation: hard-shake 0.3s ease-in-out; filter: invert(1); }
        @keyframes hard-shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-5px, 5px); }
            50% { transform: translate(5px, -5px); }
            75% { transform: translate(-5px, -5px); }
        }

        #ui-glitch { display: none; margin-top: 20px; color: #ff3333; font-family: monospace; letter-spacing: 2px; text-align: center;}
        
        .glitch-btn {
            background: none; border: 1px solid #ff3333; color: #ff3333;
            padding: 15px 30px; font-size: 0.8rem; cursor: pointer; transition: 0.3s;
            margin-top: 20px; letter-spacing: 3px; font-family: monospace;
        }
        .glitch-btn:hover { background: rgba(255, 51, 51, 0.2); box-shadow: 0 0 15px rgba(255, 51, 51, 0.4); }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="bgVideo" loop playsinline>
            <source src="work_process.mp4" type="video/mp4">
        </video>
    </div>

    <div class="content-box" id="ui-normal">
        <div class="title">Artifact #01</div>
        <div class="message">
            "I built something I have never done before,<br>
            a secret piece that only you can unlock,<br>
            and I wanted you to have it."
        </div>

        <button class="unlock-btn" onclick="triggerPhase2()">[ ACCEPT ]</button>

        <div class="chinese">第一个碎片</div>
    </div>

    <div class="content-box" id="ui-glitch">
        <div style="font-size: 0.8rem; line-height: 2;">
            SYSTEM_FAILURE // ARTIFACT_OVERLOAD<br>
            UNAUTHORIZED_PROCESS_FOUND
        </div>
        
        <button class="glitch-btn" onclick="revealVideo()">[ EXTRACT_SOURCE_VIDEO ]</button>
    </div>

    <script>
        // 3D Tilt Effect for normal UI
        const uiNormal = document.getElementById('ui-normal');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 60;
            const y = (window.innerHeight / 2 - e.clientY) / 60;
            uiNormal.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });

        // The Trap Logic
        function triggerPhase2() {
            const body = document.body;
            const uiGlitch = document.getElementById('ui-glitch');
            const btn = document.querySelector('.unlock-btn');

            // 1. The Suspense: Change text and disable clicks
            btn.innerText = "[ PROCESSING... ]";
            btn.style.opacity = "0.5";
            btn.style.pointerEvents = "none"; 

            // 2. The Delay: Wait 1.5 seconds before crashing
            setTimeout(() => {
                // Shake the screen
                body.classList.add('system-shake');

                // 3. The Reveal: Swap the UI in a split second
                setTimeout(() => {
                    body.classList.remove('system-shake');
                    uiNormal.style.display = 'none';
                    uiGlitch.style.display = 'block';
                }, 400); // Screen shakes for 0.4s

            }, 1500); 
        }

        // Play Video Logic
        function revealVideo() {
            const uiGlitch = document.getElementById('ui-glitch');
            const video = document.getElementById('bgVideo');

            // Fade out the glitch text, clear the video blur, and play
            uiGlitch.style.transition = "opacity 1s ease";
            uiGlitch.style.opacity = '0';
            
            setTimeout(() => {
                uiGlitch.style.display = 'none'; // fully remove it
            }, 1000);

            video.classList.add('clear-video');
            video.play();
        }
    </script>
</body>
</html>
